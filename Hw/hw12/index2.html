<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hw3</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}

.container {
    background: #1eb8b8;
    color: white;
    padding: 60px;
}

h1 {
    font-size: 42px;
    line-height: 1.2;
    margin-bottom: 40px;
}

.info {
    display: flex;
    align-items: center;
    gap: 30px;
}

.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.text {
    display: flex;
    gap: 60px;
}

.item span {
    color: #8ecaca;
    font-size: 14px;
}

.item {
    font-size: 18px;
}

@media (max-width: 600px) {

    .container {
        padding: 25px;
    }

    h1 {
        font-size: 26px;
    }

    .info {
        flex-direction: column;
        align-items: flex-start;
    }

    .text {
        flex-direction: column;
        gap: 15px;
    }

    .item {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>
        The Difference Between<br>
        Responsive and<br>
        Adaptive Design
    </h1>

    <div class="info">
        <div class="avatar">
            <img src="https://www.shutterstock.com/image-vector/user-profile-icon-vector-avatar-600nw-2558760599.jpg">
        </div>

        <div class="text">
            <div class="item">
                <span>Author</span><br>
                Geoff Graham
            </div>

            <div class="item">
                <span>49 Comments</span><br>
                Go to comments
            </div>

            <div class="item">
                <span>Published</span><br>
                Nov 11, 2017
            </div>

            <div class="item">
                <span>Updated</span><br>
                Nov 17, 2018
            </div>
        </div>
    </div>

</div>

</body>
</html>
