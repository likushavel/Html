<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Colors</title>

<style>

body{
font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

.wrap{
width:900px;
margin:50px auto;
}

.item{
width:250px;
display:inline-block;
margin:10px;
position:relative;
}

.item img{
width:100%;
height:180px;
object-fit:cover;
}

.line{
height:3px;
background:rgb(208, 0, 255);
margin-top:10px;
}

.info{
position:absolute;
bottom:0;
background:rgba(0,0,0,0.8);
color:white;
width:100%;
padding:10px;
display:none;
}

.item:hover .info{
display:block;
}

</style>

</head>

<body>

<div class="wrap">

<div class="item">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRA_n0xhLgVMzEWZuPk4Ns3N909RxmTkV-DaA&s">
<div class="info">Color 1<br>Blue</div>
<div class="line"></div>
</div>

<div class="item">
<img src="https://img.freepik.com/free-photo/red-paper-background-elegant-scarlet-background-holiday-decoration-web-design-paper-texture_166373-2152.jpg?semt=ais_rp_progressive&w=740&q=80">
<div class="info">Color 2<br>Red</div>
<div class="line"></div>
</div>

<div class="item">
<img src="https://img.freepik.com/free-photo/abstract-solid-shining-yellow-gradient-studio-wall-room-background_1258-70808.jpg?semt=ais_hybrid&w=740&q=80">
<div class="info">Color 3<br>Yellow</div>
<div class="line"></div>
</div>

<div class="item">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNt2DXWn6dfo270LpGVoYVdH7QiqwrbIKl_g&s">
<div class="info">Color 4<br>Pink</div>
<div class="line"></div>
</div>

<div class="item">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSNyhUccCX1GsYm8In0Dpa7Cfc-scQHvXQXuw&s">
<div class="info">Color 5<br>White</div>
<div class="line"></div>
</div>

<div class="item">
<img src="https://www.publicdomainpictures.net/pictures/390000/nahled/image-1614231151qO3.jpg">
<div class="info">Color 6<br>Purple</div>
<div class="line"></div>
</div>

</div>

</body>
</html>
