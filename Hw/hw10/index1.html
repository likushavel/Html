<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>ts1</title>

<style>
body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    background: #eee;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: #ddd;
    padding: 20px;
    border-radius: 10px;
}

.form {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}


.block {
    flex: 1;
    min-width: 250px;
}
h2 {
    font-size: 18px;
}
input, select {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    border: none;
    border-bottom: 1px solid #999;
    background: transparent;
    outline: none;
}
.checks {
    margin-top: 10px;
}

.checks label {
    display: block;
    margin: 5px 0;
}


button {
    margin-top: 20px;
    padding: 10px 20px;
    background: #2c7a7b;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
@media (max-width: 900px) {
    .form {
        flex-direction: column;
    }
}
</style>

</head>
<body>

<div class="container">

<form>

<div class="form">

    <div class="block">
        <h2>Registration form</h2>

        <input type="text" placeholder="Username">
        <input type="email" placeholder="Email address">
        <input type="password" placeholder="Password">
        <input type="password" placeholder="Confirm password">

        <div class="checks">
            <label><input type="checkbox"> I want to receive news</label>
            <label><input type="checkbox"> I agree with Terms</label>
        </div>
    </div>

    <div class="block">
        <h2>Personal danii</h2>

        <input type="text" placeholder="First name">
        <input type="text" placeholder="Last name">

        <select>
            <option>Male</option>
            <option>Female</option>
        </select>

        <input type="date">
    </div>

</div>

<button type="submit">SUBMIT</button>

</form>

</div>

</body>
</html>
