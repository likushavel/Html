<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pr3</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;

}
body{
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: url('https://tse1.mm.bing.net/th/id/OIP.d0WAmRgNIIqKyWB-0o-7hQHaEK?rs=1&pid=ImgDetMain&o=7&rm=3') no-repeat;
    background-size: cover;
    background-position: center;
}
.wrapper{
    width: 420px;
    background: transparent;
    border: 3px solid rgba(255,255,255, .3);
    backdrop-filter: blur(30px);
    box-shadow:  0 0 15px rgba(0, 0, 0, .1);
    color: #ffffff;
    border-radius: 10px;
    padding: 30px 40px;
}
.wrapper h1{
    font-size: 36px;
    text-align: center;
}
.wrapper .input-box{
    position: relative;
    width: 100%;
    height: 50px;
    margin: 30px 0;
}

.input-box input{
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    border: 2px solid rgba(255,255,255, .2);
    border-radius: 40px;
    font-size: 16px;
    color: #fff;
    padding: 20px 45px 20px 20px;

}

.input-box input::placeholder{
    color: #fff;

}
.input-box i{
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
}

.wrapper .remember-forgot{
    display: flex;
    justify-content: space-between;
    font-size: 14.5px;
    margin:  -15px 0 15px;

}

.remember-forgot label input{
    accent-color: #fff;
    margin-right: 3px;
}

.remember-forgot a{
    color: #fff;
    text-decoration: none;
}
.remember-forgot a:hover{
    text-decoration: underline;
}

.btn{
    width: 100%;
    height: 45px;
    background: #fff;
    border: none;
    outline: none;
    border-radius: 40px;
    box-shadow: 0 0 10px rgba(255,255,255, .1);
    cursor: pointer;
    font-size: 16px;
    color: #333;
    font-weight: 600;
}

.btn:hover{
    display: block;
    filter: drop-shadow(0 0 25px #923a8e);
}

.register-link{
   font-size: 14.5px;
   text-align: center;
   margin: 20px 0 15px;

}

.register-link p a{
    color: #fff;
    text-decoration: none;
    font-weight: 600;

}



.or{
    text-align: center;
    margin: 20px 0;
    font-size: 14.5px;
    
}

.butto{
    width: 46%;
    height: 45px;
    background: #983b3b;
    border: none;
    outline: none;
    border-radius: 35px;
    
    
    font-size: 16px;
    color: #fff;
    
}



.button1{
    width: 46%;
    height: 45px;
    background: #f21d1d;
    border: none;
    outline: none;
    border-radius: 35px;
    font-size: 16px;
    color: #fff;
    margin-left: 19px;
}




    </style>
</head>
<body>
    <div class="wrapper">
        <form action ="">
            <h1>Login</h1>
            <div class ="input-box">
                <input type="text" placeholder="Username">
                
                
            </div>
            <div class ="input-box">
               <input type="text" placeholder="Password">
                
                
            </div>

            <div class="remember-forgot">
                <label><input type="checkbox">Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" class="btn">Login</button>

            <div class="register-link">
                <p>Don't have an account? <a href="#">Register</a></p>
            </div>
        </form>
        <h2 class="or">Or login with...</h2>
        <button class="butto">Facebook</button>
        
        <button class="button1"><img src="" alt="">Twitter</button>
    </div>
</body>
</html>
