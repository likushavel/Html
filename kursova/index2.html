<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення замовлення</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">ROZETKA</a>
        <a href="index.html" class="btn">На головну</a>
    </header>

    <main class="container">
        <h1 class="checkout-title">Оформлення замовлення</h1>
        <form class="checkout-form" action="#" method="post">
            <label for="name">Ім'я та прізвище:</label>
            <input type="text" id="name" name="name" required placeholder="Епштейн Ахмедович">

            <label for="phone">Телефон:</label>
            <input type="tel" id="phone" name="phone" required placeholder="+380...">

            <label for="city">Місто доставки:</label>
            <input type="text" id="city" name="city" required placeholder="Наприклад, Київ">

            <button type="submit" class="btn">Підтвердити замовлення</button>
        </form>
    </main>
</body>
</html>
