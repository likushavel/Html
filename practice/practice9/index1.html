<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Pr1</title>

<style>
body {
    margin: 0;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
    background: #e6e6e6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.upload-box {
    background: #f5f5f5;
    padding: 20px;
    width: 90%;
    max-width: 700px;
    border: 1px solid #ccc;
}

.content {
    display: flex;
    gap: 20px;
}

.image {
    flex: 1;
    background: #ccc;
    display: flex;
    justify-content: center;
    align-items: center;
}

.image img {
    width: 80px;
}

.info {
    flex: 2;
}

.progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 5px;
}

.progress-bar {
    background: #ddd;
    height: 10px;
    position: relative;
    margin-bottom: 10px;
}

.progress {
    background: #6c7ae0;
    width: 40%;
    height: 100%;
}

h3 {
    margin: 10px 0 5px;
}

p {
    font-size: 12px;
    color: #555;
}
button {
    background: #4a5acb;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    cursor: pointer;
}

@media (max-width: 600px) {
    .content {
        flex-direction: column;
    }
}
</style>

</head>
<body>

<div class="upload-box">

    <div class="content">

        <div class="image">
            <img src="https://tse1.mm.bing.net/th/id/OIP.JeQ-6YPDTfPF2p-YmaiyTAHaHV?rs=1&pid=ImgDetMain&o=7&rm=3">
        </div>

        <div class="info">
            <div class="progress-text">
                <span>UPLOADING 40%</span>
                <span>About 23 minutes remaining</span>
            </div>

            <div class="progress-bar">
                <div class="progress"></div>
            </div>

            <h3>Title of video</h3>
            <p>Your video is still uploading. Please keep this page open until it's done.</p>

            <button>DONE</button>
        </div>

    </div>

</div>

</body>
</html>
