<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pr1</title>

<style>

body{
font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
text-align:center;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
}

.modal-box{
background:white;
width:300px;
padding:20px;
margin:150px auto;
}

.modal:target{
display:block;
}

a{
padding:10px 20px;
background:#645e81;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<h2>What is Lorem Ipsum?</h2>

<a href="#modal">Open</a>

<div id="modal" class="modal">
<div class="modal-box">
<h3>MODAL WINDOW</h3>
<p>Lorem ipsum dolor sit amet</p>
<a href="#">Close</a>
</div>
</div>

</body>
</html>
